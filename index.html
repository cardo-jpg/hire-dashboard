<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard · Seguidores · Hire</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    :root {
      --bg:#0b1525; --card:#131f30; --card2:#182538; --border:#1e3045;
      --cyan:#00c6ff; --green:#00e5a0; --yellow:#ffd166; --red:#ff6b6b;
      --purple:#a78bfa; --orange:#f97316; --pink:#f472b6; --blue:#60a5fa;
      --text:#f0f4f8; --sub:#7a90a8; --sub2:#3d5472; --grid:rgba(30,48,69,0.7);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;padding-bottom:60px;}
    header{background:linear-gradient(135deg,#0b1525,#160d2f);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;}
    .h-logo{display:flex;align-items:center;gap:12px;}
    .h-ig{width:36px;height:36px;border-radius:10px;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);display:flex;align-items:center;justify-content:center;font-size:18px;}
    .h-title{font-size:16px;font-weight:700;}
    .h-title span{background:linear-gradient(90deg,var(--purple),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .h-sub{font-size:11px;color:var(--sub);margin-top:2px;}
    .badge{display:inline-flex;align-items:center;gap:5px;background:rgba(0,229,160,.08);border:1px solid var(--green);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--green);}
    .h-right{display:flex;align-items:center;gap:12px;}
    .back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--text);text-decoration:none;transition:all .15s;white-space:nowrap;}
    .back-btn:hover{border-color:var(--cyan);color:var(--cyan);}
    @media (max-width:560px){ header{padding:14px 18px;} .back-btn span.lbl{display:none;} }
    .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* TABS */
    .tabs{background:#0c1828;border-bottom:1px solid var(--border);padding:0 32px;display:flex;}
    .tab-btn{padding:13px 20px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;transition:all .2s;}
    .tab-btn:hover{color:var(--text);}
    .tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);}
    .tab-panel{display:none;} .tab-panel.active{display:block;}
    .container{max-width:1440px;margin:0 auto;padding:28px 32px;}
    .sec-title{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin:28px 0 14px;}
    .kpi-row{display:flex;gap:10px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
    .kpi{flex:1;min-width:130px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
    .kpi-lbl{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;}
    .kpi-val{font-size:22px;font-weight:800;line-height:1.1;}
    .kpi-note{font-size:10px;color:var(--sub);margin-top:4px;}
    .k-purple{border-top:2px solid var(--purple);} .k-cyan{border-top:2px solid var(--cyan);}
    .k-green{border-top:2px solid var(--green);} .k-orange{border-top:2px solid var(--orange);}
    .k-yellow{border-top:2px solid var(--yellow);}
    .cv{color:var(--purple);} .cc{color:var(--cyan);} .cg{color:var(--green);}
    .co{color:var(--orange);} .cy{color:var(--yellow);}
    .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
    .chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 22px;}
    .chart-box-ttl{font-size:13px;font-weight:700;margin-bottom:2px;}
    .chart-box-sub{font-size:11px;color:var(--sub);margin-bottom:16px;}
    .cw{position:relative;} .h280{height:280px;}
    .tbl-box{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:24px;}
    .tbl-head{background:var(--card2);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
    .tbl-head-title{font-size:12px;font-weight:700;}
    .tbl-scroll{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;}
    th{background:var(--card2);font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;padding:9px 14px;text-align:left;white-space:nowrap;}
    td{padding:10px 14px;font-size:12.5px;border-top:1px solid var(--border);white-space:nowrap;}
    tr:hover td{background:rgba(255,255,255,.025);}
    .tr{text-align:right;}
    .tnm{max-width:240px;overflow:hidden;text-overflow:ellipsis;}
    .lnk{color:var(--cyan);font-size:11px;text-decoration:none;display:inline-flex;align-items:center;gap:4px;}
    .lnk:hover{text-decoration:underline;}
    .mf-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
    .mf-btn{padding:5px 13px;font-size:11px;font-weight:600;color:var(--sub);background:var(--card);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .15s;}
    .mf-btn:hover{color:var(--text);border-color:var(--purple);}
    .mf-btn.active{background:rgba(167,139,250,.15);color:var(--purple);border-color:var(--purple);}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;align-items:center;justify-content:center;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
    .modal-title{font-size:14px;font-weight:700;margin-bottom:20px;}
    .form-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
    .form-label{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;}
    .form-input{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);outline:none;width:100%;font-family:inherit;}
    .form-input:focus{border-color:var(--purple);}
    .form-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
    .btn-purple{background:rgba(167,139,250,.15);border:1px solid var(--purple);color:var(--purple);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;}
    .btn-purple:hover{background:rgba(167,139,250,.28);}
    .btn-ghost{background:none;border:1px solid var(--border);color:var(--sub);border-radius:8px;padding:9px 18px;font-size:12px;font-weight:700;cursor:pointer;}
    .btn-del{background:rgba(255,107,107,.1);border:none;color:var(--red);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;}
    .btn-edit-posts{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);color:var(--purple);border-radius:8px;padding:4px 12px;font-size:10px;font-weight:700;cursor:pointer;}
    .post-list-item{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;}
    .post-list-name{font-size:12px;color:var(--text);line-height:1.4;}
    .pill-ativo{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(0,229,160,.12);color:var(--green);user-select:none;border:1px solid rgba(0,229,160,.25);}
    .pill-inativo{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,107,107,.1);color:var(--red);user-select:none;border:1px solid rgba(255,107,107,.2);}
    .pill-subir{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,209,102,.12);color:var(--yellow);user-select:none;border:1px solid rgba(255,209,102,.25);}
    .modal-sep{border:none;border-top:1px solid var(--border);margin:20px 0 16px;}
    .modal-sub{font-size:10px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px;}
    tr.inativo td{opacity:.4;}
    tr.inativo .tnm::after{content:' (inativo)';font-size:10px;color:var(--red);}
  </style>
</head>
<body>

<header>
  <div class="h-logo">
    <div class="h-ig">📸</div>
    <div>
      <div class="h-title">Dashboard · <span>Seguidores</span></div>
      <div class="h-sub" id="h-sub">⏳ Carregando dados...</div>
    </div>
  </div>
  <div class="h-right">
    <a href="https://cardo-jpg.github.io/hire-funis-dash/" class="back-btn">← <span class="lbl">Voltar aos Funis</span></a>
    <div class="badge"><span class="dot"></span>Ao vivo</div>
  </div>
</header>

<div class="tabs" id="tabs"></div>
<div id="panels"></div>

<!-- MODAL POSTS (compartilhado entre as abas) -->
<div class="modal-overlay" id="posts-modal">
  <div class="modal-box">
    <p class="modal-title" id="modal-title">✏️ Gerenciar Posts</p>
    <div id="post-list"></div>
    <hr class="modal-sep">
    <p class="modal-sub">Adicionar Post</p>
    <div class="form-row">
      <label class="form-label">Nome do Post</label>
      <input class="form-input" id="f-nome" placeholder="Ex: CARROSSEL - Trabalhar para uma empresa internacional">
    </div>
    <div class="form-row">
      <label class="form-label">Link do Instagram</label>
      <input class="form-input" id="f-link" placeholder="https://www.instagram.com/p/...">
    </div>
    <div class="form-grid3">
      <div class="form-row">
        <label class="form-label">Investimento (R$)</label>
        <input class="form-input" id="f-inv" placeholder="0.00" type="number" step="0.01" min="0">
      </div>
      <div class="form-row">
        <label class="form-label">Seguidores Ganhos</label>
        <input class="form-input" id="f-seg" placeholder="0" type="number" min="0">
      </div>
      <div class="form-row">
        <label class="form-label">Valor Diário (R$)</label>
        <input class="form-input" id="f-dia" placeholder="0" type="number" step="0.01" min="0">
      </div>
    </div>
    <div class="form-row" style="margin-top:4px">
      <label class="form-label">Status</label>
      <select class="form-input" id="f-status">
        <option value="ativo">Ativo</option>
        <option value="inativo">Inativo</option>
        <option value="subir">Subir</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn-purple" onclick="draftAdd()">+ Adicionar</button>
    </div>
    <hr class="modal-sep">
    <div style="display:flex;gap:10px">
      <button class="btn-purple" onclick="saveModal()" style="flex:1;justify-content:center">💾 Salvar</button>
      <button class="btn-ghost" onclick="closePostsModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG — uma dashboard, várias abas. Adicione perfis aqui.
   ═══════════════════════════════════════════════════════════════ */
const SHEET_ID = '1zFQVcdCqczs5eO9cB8eyii4Tf-kV3qkuYbN-sEB5oBA';
const POSTS_API = '';  // ← COLE a URL /exec do Apps Script (posts-backend.gs). Vazio = só localStorage (não compartilha).
const PROFILES = [
  {key:'hire', name:'Hire Brazil',  tab:'HIRE', postsKey:'hire_posts_v1', icon:'🏢'},
  {key:'malu', name:'Malu Osowski', tab:'MALU', postsKey:'malu_posts_v1', icon:'👤'},
  // HIRE Internacional — confirme o nome EXATO da aba em `tab`. Se a fonte for OUTRA
  // planilha, adicione `sheetId:'<id da planilha>'` nesta linha.
  {key:'hireint', name:'HIRE Internacional', tab:'INTERNACIONAL', postsKey:'hireint_posts_v1', icon:'🌍'},
];
/* ═══════════════════════════════════════════════════════════════ */

const GVT = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
const C = {cyan:'#00c6ff',green:'#00e5a0',yellow:'#ffd166',red:'#ff6b6b',purple:'#a78bfa',orange:'#f97316',pink:'#f472b6',blue:'#60a5fa',grid:'rgba(30,48,69,0.7)'};
const ch={};
const R = id => document.getElementById(id);
const fmtN = n => n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'k':String(n||0);
const fmtR = v => 'R$ '+(+v||0).toFixed(2).replace('.',',');
const money = s => {
  let v=(s||'').replace(/R\$\s?/g,'').replace(/\$/g,'').replace(/\s/g,'').replace(/-$/,'').trim();
  if(v.includes(',')&&v.includes('.'))v=v.replace(/\./g,'').replace(',','.');
  else if(v.includes(','))v=v.replace(',','.');
  return parseFloat(v)||0;
};
const mkChart=(id,cfg)=>{if(ch[id])ch[id].destroy();ch[id]=new Chart(R(id),cfg);};

function csvLine(l){const r=[];let c='',q=false;for(const x of l){if(x==='"'){q=!q;}else if(x===','&&!q){r.push(c);c='';}else c+=x;}r.push(c);return r;}
function parseCSV(txt){
  const ls=txt.trim().split('\n');
  const hs=csvLine(ls[0]).map(h=>h.replace(/"/g,'').trim());
  return ls.slice(1).filter(l=>l.trim()).map(l=>{
    const v=csvLine(l).map(v=>v.replace(/^"|"$/g,'').trim());
    return hs.reduce((o,h,i)=>{o[h]=v[i]||'';return o;},{});
  });
}
function col(row,...names){
  const norm=s=>s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();
  for(const n of names){
    if(row[n]!==undefined&&row[n]!=='')return row[n];
    const nk=norm(n);
    const found=Object.entries(row).find(([k])=>norm(k)===nk);
    if(found&&found[1]!=='')return found[1];
  }
  return'';
}
const MS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
function parseDailyDate(ddmm){
  if(!ddmm||!ddmm.includes('/'))return null;
  const[ds,ms]=ddmm.trim().split('/');
  const d=parseInt(ds),m=parseInt(ms);
  if(!d||!m||m<1||m>12)return null;
  const year=m>=11?2025:2026;
  const key=`${year}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const mKey=`${year}-${String(m).padStart(2,'0')}`;
  return{year,month:m,day:d,key,label:ddmm,mKey};
}
const postName=s=>{const clean=s.replace(/^(Instagram post:|Post do Instagram:|Reel do Instagram:|REELS?|CARROSSEL?|IMAGEM)\s*[-–:]?\s*/i,'').trim();return clean.length>55?clean.substring(0,55)+'…':clean||s.substring(0,55);};

/* estado por perfil */
const P = {};
PROFILES.forEach(p=>{P[p.key]={cfg:p,rows:[]};});

/* ── HTML dos componentes (painel por perfil, IDs prefixados) ── */
function panelHTML(k){
  return `<div class="container">
    <p class="sec-title">Resultados da Campanha · Acompanhamento Diário</p>
    <div class="kpi-row">
      <div class="kpi k-orange"><p class="kpi-lbl">Investimento</p><p class="kpi-val co" id="${k}-d-invest">—</p><p class="kpi-note">período selecionado</p></div>
      <div class="kpi k-purple"><p class="kpi-lbl">Novos Seguidores</p><p class="kpi-val cv" id="${k}-d-seg">—</p><p class="kpi-note">total do período</p></div>
      <div class="kpi k-cyan"><p class="kpi-lbl">CPS Médio</p><p class="kpi-val cc" id="${k}-d-cps">—</p><p class="kpi-note">custo por seguidor</p></div>
      <div class="kpi k-yellow"><p class="kpi-lbl">Cliques</p><p class="kpi-val cy" id="${k}-d-cliques">—</p><p class="kpi-note" id="${k}-d-cpc-note">CPC —</p></div>
      <div class="kpi k-green"><p class="kpi-lbl">Impressões</p><p class="kpi-val cg" id="${k}-d-imp">—</p><p class="kpi-note" id="${k}-d-cpm-note">CPM —</p></div>
    </div>
    <div id="${k}-month-filter-bar" class="mf-bar"></div>
    <div class="chart-row">
      <div class="chart-box">
        <p class="chart-box-ttl">Novos Seguidores por Dia</p>
        <p class="chart-box-sub">Linha roxa = seguidores captados · Linha ciano = custo por seguidor (CPS)</p>
        <div class="cw h280"><canvas id="${k}-d-chart1"></canvas></div>
      </div>
      <div class="chart-box">
        <p class="chart-box-ttl">Investimento Diário</p>
        <p class="chart-box-sub">Linha verde = investimento · Linha laranja = impressões</p>
        <div class="cw h280"><canvas id="${k}-d-chart2"></canvas></div>
      </div>
    </div>
    <div class="tbl-box">
      <div class="tbl-head" style="justify-content:space-between">
        <span class="tbl-head-title">Rastreamento de Seguidores · Posts Impulsionados</span>
        <button class="btn-edit-posts" onclick="openPostsModal('${k}')">✏️ Gerenciar posts</button>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th>Post</th><th class="tr">Seguidores (Total)</th><th class="tr">Ganho</th>
            <th class="tr">Investimento</th><th class="tr">CPS</th><th>Link</th>
          </tr></thead>
          <tbody id="${k}-s-tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="tbl-box">
      <div class="tbl-head" style="justify-content:space-between">
        <span class="tbl-head-title">Detalhamento por Dia</span>
        <span style="font-size:10px;color:var(--sub);font-weight:500">planilha · ordem decrescente</span>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead><tr>
            <th>Data</th><th class="tr">Novos Seg.</th><th class="tr">Investimento</th><th class="tr">CPS</th>
            <th class="tr">Cliques</th><th class="tr">CPC</th><th class="tr">Impressões</th><th class="tr">CPM</th>
          </tr></thead>
          <tbody id="${k}-d-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>`;
}

/* ── monta abas + painéis ── */
function buildShell(){
  R('tabs').innerHTML=PROFILES.map((p,i)=>
    `<button class="tab-btn ${i===0?'active':''}" onclick="switchTab('${p.key}',this)">${p.icon} ${p.name}</button>`).join('');
  R('panels').innerHTML=PROFILES.map((p,i)=>
    `<div id="panel-${p.key}" class="tab-panel ${i===0?'active':''}">${panelHTML(p.key)}</div>`).join('');
}
function switchTab(k,b){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
  R('panel-'+k).classList.add('active'); b.classList.add('active');
}

/* ── render diário (por perfil) ── */
function renderDailyView(k,filterMKey){
  const st=P[k];
  const todayKey=new Date().toISOString().substring(0,10);
  const base=filterMKey==='all'?st.rows:st.rows.filter(r=>r._pd&&r._pd.mKey===filterMKey);
  // só dias com atividade real (ignora linhas-template vazias do fim/começo da planilha)
  const rows=base.filter(r=>r._pd&&r._pd.key<=todayKey&&(r._inv>0||r._seg>0||r._clk>0||r._imp>0));

  const totInv=rows.reduce((a,r)=>a+r._inv,0);
  const totSeg=rows.reduce((a,r)=>a+r._seg,0);
  const totClk=rows.reduce((a,r)=>a+r._clk,0);
  const totImp=rows.reduce((a,r)=>a+r._imp,0);
  const avgCPS=totSeg>0?totInv/totSeg:0;
  const avgCPC=totClk>0?totInv/totClk:0;
  const avgCPM=totImp>0?totInv/totImp*1000:0;

  R(k+'-d-invest').textContent=fmtR(totInv);
  R(k+'-d-seg').textContent=totSeg>0?'+'+fmtN(totSeg):'—';
  R(k+'-d-cps').textContent=avgCPS>0?fmtR(avgCPS):'—';
  R(k+'-d-cliques').textContent=fmtN(totClk);
  R(k+'-d-cpc-note').textContent=avgCPC>0?'CPC '+fmtR(avgCPC):'CPC —';
  R(k+'-d-imp').textContent=fmtN(totImp);
  R(k+'-d-cpm-note').textContent=avgCPM>0?'CPM '+fmtR(avgCPM):'CPM —';

  const labels=rows.map(r=>r._pd.label);
  const segArr=rows.map(r=>r._seg>0?r._seg:null);
  const cpsArr=rows.map(r=>r._cps>0?+r._cps.toFixed(2):null);
  const invArr=rows.map(r=>r._inv>0?+r._inv.toFixed(2):null);
  const impArr=rows.map(r=>r._imp>0?r._imp:null);
  const lineOpts=(color,dash=[])=>({borderColor:color,backgroundColor:'transparent',pointBackgroundColor:color,pointRadius:3,pointHoverRadius:5,borderWidth:2,borderDash:dash,tension:.35,fill:false,spanGaps:true});

  mkChart(k+'-d-chart1',{type:'line',data:{labels,datasets:[
    {...lineOpts(C.purple,[6,4]),label:'Novos Seguidores',data:segArr,yAxisID:'yA'},
    {...lineOpts(C.cyan,[4,4]),label:'CPS (R$)',data:cpsArr,yAxisID:'yB'},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{boxWidth:10,padding:10,font:{size:11},usePointStyle:true}}},
    scales:{x:{grid:{color:C.grid},ticks:{maxRotation:60,font:{size:9}}},
      yA:{position:'left',grid:{color:C.grid},ticks:{precision:0,maxTicksLimit:6},title:{display:true,text:'Seguidores',color:C.purple,font:{size:10}}},
      yB:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:fmtR,color:C.cyan,maxTicksLimit:6},title:{display:true,text:'CPS',color:C.cyan,font:{size:10}}}}
  }});

  mkChart(k+'-d-chart2',{type:'line',data:{labels,datasets:[
    {...lineOpts(C.green,[6,4]),label:'Investimento (R$)',data:invArr,yAxisID:'yA'},
    {...lineOpts(C.orange,[4,4]),label:'Impressões',data:impArr,yAxisID:'yB'},
  ]},options:{responsive:true,maintainAspectRatio:false,
    plugins:{legend:{position:'top',labels:{boxWidth:10,padding:10,font:{size:11},usePointStyle:true}}},
    scales:{x:{grid:{color:C.grid},ticks:{maxRotation:60,font:{size:9}}},
      yA:{position:'left',grid:{color:C.grid},ticks:{callback:fmtR,maxTicksLimit:6}},
      yB:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>fmtN(v),color:C.orange,maxTicksLimit:6}}}
  }});

  R(k+'-d-tbody').innerHTML=[...rows].reverse().map(r=>`<tr>
    <td style="white-space:nowrap;font-weight:600;color:var(--sub)">${r._pd.label}</td>
    <td class="tr" style="color:var(--purple)">${r._seg>0?'+'+r._seg:'—'}</td>
    <td class="tr" style="color:var(--orange)">${r._inv>0?fmtR(r._inv):'—'}</td>
    <td class="tr" style="color:var(--cyan)">${r._cps>0?fmtR(r._cps):'—'}</td>
    <td class="tr">${r._clk>0?fmtN(r._clk):'—'}</td>
    <td class="tr" style="color:var(--sub)">${r._cpc>0?fmtR(r._cpc):'—'}</td>
    <td class="tr">${r._imp>0?fmtN(r._imp):'—'}</td>
    <td class="tr" style="color:var(--sub)">${r._cpm>0?fmtR(r._cpm):'—'}</td>
  </tr>`).join('')||'<tr><td colspan="8" style="text-align:center;color:var(--sub);padding:20px">Sem dados no período</td></tr>';
}
window.setDailyMonth=function(k,mKey,btn){
  R(k+'-month-filter-bar').querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDailyView(k,mKey);
};

function renderImp(k,dailyRows){
  const st=P[k];
  st.rows=dailyRows.map(r=>{
    const pd=parseDailyDate(col(r,'DATA','Data'));
    const seg=parseInt(col(r,'Novos Seguidores'))||0;
    const inv=money(col(r,'Investimento diário BRL','Investimento diário','Investimento diario','Investimento'));
    const clk=parseInt((col(r,'Cliques')||'').replace(/\./g,''))||0;
    const imp=parseInt((col(r,'Impressões','Impressoes')||'').replace(/\./g,''))||0;
    const cps=money(col(r,'Custo por novos seguidores'))||(seg>0&&inv>0?inv/seg:0);
    const cpc=money(col(r,'CPC'))||(clk>0&&inv>0?inv/clk:0);
    const cpm=money(col(r,'CPM'))||(imp>0&&inv>0?inv/imp*1000:0);
    return{...r,_pd:pd,_seg:seg,_inv:inv,_cps:cps,_clk:clk,_cpc:cpc,_imp:imp,_cpm:cpm};
  }).filter(r=>r._pd).sort((a,b)=>a._pd.key.localeCompare(b._pd.key));

  const mKeys=[...new Set(st.rows.filter(r=>r._inv>0||r._seg>0).map(r=>r._pd.mKey))].sort();
  const bar=R(k+'-month-filter-bar');
  bar.innerHTML=`<button class="mf-btn" onclick="setDailyMonth('${k}','all',this)">Tudo</button>`+
    mKeys.map(mk=>{const[y,m]=mk.split('-');const label=MS[+m-1]+'/'+String(+y).slice(2);return`<button class="mf-btn" onclick="setDailyMonth('${k}','${mk}',this)">${label}</button>`;}).join('');
  // default = "Tudo" (mostra todos os meses; assim atualizações de qualquer mês já aparecem)
  const defBtn=bar.querySelector(`[onclick*="'all'"]`)||bar.querySelector('.mf-btn');
  if(defBtn)defBtn.classList.add('active');
  renderDailyView(k,'all');
  renderPostsTable(k);
}

/* ── POSTS (localStorage por perfil) ── */
function getPosts(k){ if(POSTS_API&&P[k].sheetPosts) return P[k].sheetPosts; try{const s=localStorage.getItem(P[k].cfg.postsKey);return s?JSON.parse(s):[];}catch(e){return[];}}
function setPostsLS(k,p){localStorage.setItem(P[k].cfg.postsKey,JSON.stringify(p));}
// Carrega posts do Apps Script (fonte COMPARTILHADA, via JSONP). Cai no localStorage se POSTS_API vazio/falhar.
function loadSheetPosts(){
  if(!POSTS_API) return;
  PROFILES.forEach(p=>{
    const cb='_pcb_'+p.key+'_'+Date.now();
    const s=document.createElement('script');
    const done=()=>{try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);clearTimeout(tm);};
    const tm=setTimeout(done,12000);
    window[cb]=(resp)=>{ if(resp&&resp.ok&&Array.isArray(resp.posts)){ P[p.key].sheetPosts=resp.posts.map(x=>({nome:x.nome||'',link:x.link||'',inv:+x.inv||0,dia:+x.dia||0,saldo:+x.saldo||0,status:x.status||'ativo',obs:x.obs||''})); setPostsLS(p.key,P[p.key].sheetPosts); renderPostsTable(p.key); } done(); };
    s.onerror=done;
    s.src=POSTS_API+'?profile='+encodeURIComponent(p.key)+'&callback='+cb+'&_='+Date.now();
    document.head.appendChild(s);
  });
}
let _draft=null,_modalK=null;
function openPostsModal(k){_modalK=k;_draft=getPosts(k).map(p=>({...p}));R('modal-title').textContent='✏️ Gerenciar Posts · '+P[k].cfg.name;renderPostList();R('posts-modal').classList.add('open');}
function closePostsModal(){_draft=null;_modalK=null;R('posts-modal').classList.remove('open');}
async function saveModal(){
  // se o form "Adicionar" estiver preenchido mas não foi adicionado, adiciona antes de salvar
  if(R('f-nome').value.trim()&&R('f-link').value.trim())draftAdd();
  const k=_modalK, posts=_draft.slice();
  setPostsLS(k,posts); P[k].sheetPosts=posts;   // cache local + estado
  renderPostsTable(k); closePostsModal();
  // sincroniza na planilha (compartilhado entre todos os computadores)
  if(POSTS_API){ try{ await fetch(POSTS_API,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify({profile:k,posts})}); }catch(e){console.warn('Falha ao sincronizar posts:',e);} }
}
// setter global — inline handlers não enxergam _draft (let); por isso passam por aqui
function draftEditField(i,f,v){
  if(!_draft||!_draft[i])return;
  if(f==='inv'||f==='dia')_draft[i][f]=parseFloat(v)||0;
  else if(f==='saldo')_draft[i][f]=parseInt(v)||0;
  else _draft[i][f]=v;
}
function statusPillHtml(status,clickable,idx){
  const map={ativo:['pill-ativo','Ativo'],inativo:['pill-inativo','Inativo'],subir:['pill-subir','📤 Subir']};
  const[cls,label]=map[status||'ativo']||map['ativo'];
  const onclick=clickable?`onclick="draftToggle(${idx})" title="Clique para alternar"`:'';
  return`<span class="${cls}" style="font-size:10px;padding:2px 9px;cursor:${clickable?'pointer':'default'}" ${onclick}>${label}</span>`;
}
function draftToggle(i){const cycle={ativo:'inativo',inativo:'subir',subir:'ativo'};_draft[i].status=cycle[_draft[i].status||'ativo']||'ativo';renderPostList();}
function renderPostList(){
  if(!_draft)return;
  const esc=s=>(s||'').toString().replace(/"/g,'&quot;');
  R('post-list').innerHTML=_draft.length===0
    ?'<p style="font-size:12px;color:var(--sub);text-align:center;padding:16px 0">Nenhum post cadastrado</p>'
    :_draft.map((p,i)=>{
      return`<div class="post-list-item" style="flex-direction:column;align-items:stretch;gap:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <input class="form-input" style="flex:1;font-size:12px;padding:7px 10px" placeholder="Nome do post"
            value="${esc(p.nome)}" oninput="draftEditField(${i},'nome',this.value)">
          ${statusPillHtml(p.status,true,i)}
          <button class="btn-del" onclick="draftDelete(${i})">✕</button>
        </div>
        <input class="form-input" style="font-size:11px;padding:6px 10px;color:var(--cyan)" placeholder="Link do Instagram"
          value="${esc(p.link)}" oninput="draftEditField(${i},'link',this.value)">
        <div class="form-grid3">
          <div class="form-row" style="margin:0"><label class="form-label">Investido R$</label>
            <input class="form-input" type="number" step="0.01" min="0" style="font-size:11px;padding:6px 10px"
              value="${p.inv||''}" oninput="draftEditField(${i},'inv',this.value)"></div>
          <div class="form-row" style="margin:0"><label class="form-label">Seguidores</label>
            <input class="form-input" type="number" min="0" style="font-size:11px;padding:6px 10px"
              value="${p.saldo||''}" oninput="draftEditField(${i},'saldo',this.value)"></div>
          <div class="form-row" style="margin:0"><label class="form-label">Diário R$</label>
            <input class="form-input" type="number" step="0.01" min="0" style="font-size:11px;padding:6px 10px"
              value="${p.dia||''}" oninput="draftEditField(${i},'dia',this.value)"></div>
        </div>
        <input class="form-input" style="font-size:11px;padding:6px 10px;color:var(--sub)" placeholder="Observação (opcional)..."
          value="${esc(p.obs)}" oninput="draftEditField(${i},'obs',this.value)">
      </div>`;
    }).join('');
}
function draftDelete(i){if(!confirm('Remover este post?'))return;_draft.splice(i,1);renderPostList();}
function draftAdd(){
  const nome=R('f-nome').value.trim();const link=R('f-link').value.trim();
  if(!nome||!link){alert('Preencha pelo menos nome e link.');return;}
  const inv=parseFloat(R('f-inv').value)||0;const saldo=parseInt(R('f-seg').value)||0;
  const dia=parseFloat(R('f-dia').value)||0;const status=R('f-status').value||'ativo';
  _draft.push({nome,link,inv,saldo,dia,status,obs:''});
  R('f-nome').value='';R('f-link').value='';R('f-inv').value='';R('f-seg').value='';R('f-dia').value='';R('f-status').value='ativo';
  renderPostList();
}
function renderPostsTable(k){
  const posts=getPosts(k);
  if(posts.length===0){R(k+'-s-tbody').innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--sub);padding:20px">Nenhum post cadastrado — clique em "✏️ Gerenciar posts"</td></tr>';return;}
  R(k+'-s-tbody').innerHTML=posts.map(p=>{
    const ativo=(p.status||'ativo')==='ativo';
    const cps=p.saldo>0&&p.inv>0?p.inv/p.saldo:0;
    const obsHtml=p.obs?`<br><span style="font-size:10px;color:var(--sub);font-style:italic">${p.obs}</span>`:'';
    return`<tr class="${ativo?'':'inativo'}">
      <td style="max-width:280px">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="tnm" style="min-width:0;flex:1" title="${p.nome}">${postName(p.nome)}</span>${statusPillHtml(p.status,false,0)}
        </div>${obsHtml}
      </td>
      <td class="tr"><strong style="color:var(--purple)">${fmtN(p.saldo)}</strong></td>
      <td class="tr" style="color:var(--green)">+${fmtN(p.saldo)}</td>
      <td class="tr">${fmtR(p.inv)}</td>
      <td class="tr" style="color:var(--cyan)">${cps>0?fmtR(cps):'—'}</td>
      <td>${p.link?`<a href="${p.link}" target="_blank" class="lnk">🔗 Ver post</a>`:'—'}</td>
    </tr>`;
  }).join('');
}

/* ── LOAD (todas as abas em paralelo) ── */
async function load(){
  buildShell();
  const ts=Date.now();
  await Promise.all(PROFILES.map(async p=>{
    try{
      const sid=p.sheetId||SHEET_ID;
      const url=`https://docs.google.com/spreadsheets/d/${sid}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(p.tab)}&_=${ts}`;
      const txt=await fetch(url,{cache:'no-cache'}).then(r=>r.text());
      renderImp(p.key,parseCSV(txt));
    }catch(e){console.error('Erro',p.key,e);renderPostsTable(p.key);}
  }));
  loadSheetPosts();   // posts compartilhados (Apps Script)
  const hora=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  R('h-sub').textContent=`${PROFILES.map(p=>p.icon+' '+p.name).join('  ·  ')} · Atualizado às ${hora}`;
}
load();
</script>
